<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スマホカメラ表示</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #121212;
      color: #ffffff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.2rem;
      margin-bottom: 10px;
    }
    .video-container {
      width: 90%;
      max-width: 480px;
      aspect-ratio: 3 / 4;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      background-color: #000;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <h1>スマホカメラテスト</h1>
  <div class="video-container">
    <!-- playsinline属性でiPhoneでの全画面強制起動を防ぎます -->
    <video id="video" autoplay playsinline muted></video>
  </div>

  <script>
    const video = document.getElementById('video');

    // スマホの外カメラ（背面カメラ）をリクエストする設定
    const constraints = {
      video: {
        facingMode: "environment" // 外カメラを指定（iPhone/Android両対応）
      },
      audio: false
    };

    // カメラの起動処理
    navigator.mediaDevices.getUserMedia(constraints)
      .then((stream) => {
        video.srcObject = stream;
      })
      .catch((err) => {
        console.error("カメラのアクセスに失敗しました:", err);
        alert("カメラの許可が必要です。ブラウザの設定を確認してください。");
      });
  </script>
</body>
</html>
